version: "3.8"

services:
  qdrant:
    image: qdrant/qdrant:v1.13.4
    container_name: rag-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      QDRANT__LOG_LEVEL: INFO
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rag-network

  backend:
    build: ./backend
    container_name: rag-backend
    ports:
      - "9090:9090"
    volumes:
      - backend_data:/app/data
      - model_cache:/root/.cache/huggingface
    environment:
      - QDRANT_URL=http://qdrant:6333
      - HF_ENDPOINT=https://hf-mirror.com
      - FASTEMBED_CACHE_PATH=/app/data/fastembed_cache
    env_file:
      - ./backend/.env
    depends_on:
      qdrant:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - rag-network

  frontend:
    build: ./frontend
    container_name: rag-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - rag-network

volumes:
  qdrant_storage:
    driver: local
  backend_data:
    driver: local
  model_cache:
    driver: local

networks:
  rag-network:
    driver: bridge
